version: '3.8'

services:
  database:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: kanban
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      network: host
    network_mode: "host"
    environment:
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=kanban
      - DB_PORT=3307
      - DB_HOST=127.0.0.1
      - DATABASE_URL=mysql://root:root@127.0.0.1:3307/kanban

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      network: host
    network_mode: "host"
    environment:
      - VITE_API_URL=http://localhost:3000

volumes:
  mariadb_data:
